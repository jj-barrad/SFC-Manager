<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SFC修行AIマネージャー Ultimate</title>

<style>

body{
font-family:sans-serif;
background:#f2f4f7;
margin:0;
}

header{
background:#003b7a;
color:white;
padding:15px;
font-size:20px;
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
background:#0a4fa3;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

.progress{
background:#ddd;
height:20px;
border-radius:10px;
overflow:hidden;
}

.bar{
background:#2ea44f;
height:100%;
width:0%;
}

.good{color:green}
.mid{color:orange}
.bad{color:red}

</style>
</head>

<body>

<header>SFC修行AIマネージャー Ultimate</header>

<div class="container">

<!-- 進捗 -->

<div class="card">

<h3>修行進捗</h3>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<p id="ppText">0 / 50000 PP</p>

<p id="yearForecast"></p>

</div>

<!-- フライト入力 -->

<div class="card">

<h3>フライト追加</h3>

出発地
<input id="fromInput" placeholder="例 羽田">

到着地
<input id="toInput" placeholder="例 那覇">

PP
<input id="ppInput">

価格
<input id="priceInput">

<button onclick="addFlight()">追加</button>

</div>

<!-- テンプレ -->

<div class="card">

<h3>テンプレート</h3>

<button onclick="addTemplate('HND','OKA',2200,23000)">HND-OKA</button>
<button onclick="addTemplate('HND','CTS',1700,20000)">HND-CTS</button>
<button onclick="addTemplate('HND','FUK',1500,18000)">HND-FUK</button>
<button onclick="addTemplate('HND','TPE',2000,26000)">HND-TPE</button>
<button onclick="addTemplate('HND','BKK',3000,45000)">HND-BKK</button>
<button onclick="addTemplate('HND','HNL',4000,65000)">HND-HNL</button>

</div>

<!-- PPランキング -->

<div class="card">

<h3>PP効率ランキング</h3>

<div id="ranking"></div>

</div>

<!-- 自動修行 -->

<div class="card">

<h3>自動修行プラン</h3>

<div id="autoPlan"></div>

</div>

<!-- 国際線 -->

<div class="card">

<h3>国際線混合最適化</h3>

<div id="intlPlan"></div>

</div>

<!-- AIルート -->

<div class="card">

<h3>AI修行ルート生成</h3>

目標PP
<input id="targetPP">

予算
<input id="budget">

<button onclick="generateRoute()">AI生成</button>

<div id="routeResult"></div>

</div>

<!-- 最安 -->

<div class="card">

<h3>AI最安ルート探索</h3>

<button onclick="searchCheapest()">検索</button>

<div id="cheapResult"></div>

</div>

</div>

<script>

let flights=[]

const airportMap={
"羽田":"HND",
"那覇":"OKA",
"札幌":"CTS",
"福岡":"FUK",
"台北":"TPE",
"バンコク":"BKK",
"ホノルル":"HNL",
"サンディエゴ":"SAN"
}

function convertAirport(name){

if(airportMap[name]) return airportMap[name]

return name.toUpperCase()

}

function addFlight(){

let from=convertAirport(
document.getElementById("fromInput").value)

let to=convertAirport(
document.getElementById("toInput").value)

let route=from+"-"+to

let pp=parseInt(
document.getElementById("ppInput").value)

let price=parseInt(
document.getElementById("priceInput").value)

flights.push({route,pp,price})

update()

}

function addTemplate(f,t,pp,price){

flights.push({
route:f+"-"+t,
pp:pp,
price:price
})

update()

}

function update(){

let totalPP=0
let totalPrice=0

flights.forEach(f=>{

totalPP+=f.pp
totalPrice+=f.price

})

let progress=(totalPP/50000)*100

document.getElementById("progressBar").style.width=progress+"%"

document.getElementById("ppText").innerText=
totalPP+" / 50000 PP"

yearForecast(totalPP)

updateRanking()

updatePlan(totalPP)

}

function yearForecast(pp){

let estimate=pp*3

document.getElementById("yearForecast").innerText=
"年間予測PP : "+estimate

}

function updateRanking(){

let routes={}

flights.forEach(f=>{

let unit=f.price/f.pp

if(!routes[f.route]||routes[f.route]>unit){

routes[f.route]=unit

}

})

let html=""

Object.keys(routes).forEach(r=>{

let unit=routes[r]

let cls="mid"

if(unit<9) cls="good"
if(unit>13) cls="bad"

html+=`<div class="${cls}">
${r} : ${unit.toFixed(2)} 円/PP
</div>`

})

document.getElementById("ranking").innerHTML=html

}

function updatePlan(currentPP){

let remain=50000-currentPP

let okapp=2200

let trips=Math.ceil(remain/okapp)

let cost=trips*23000

document.getElementById("autoPlan").innerHTML=
`
残PP : ${remain}<br>
推奨路線 : HND-OKA<br>
必要往復 : ${trips}<br>
予算 : ${cost.toLocaleString()}円
`

document.getElementById("intlPlan").innerHTML=
`
国際線案<br>
HND-HNL 1回<br>
HND-OKA ${Math.max(0,trips-3)}回
`

}

function generateRoute(){

let target=parseInt(
document.getElementById("targetPP").value)

let budget=parseInt(
document.getElementById("budget").value)

let okapp=2200
let cost=23000

let trips=Math.ceil(target/okapp)

let total=trips*cost

document.getElementById("routeResult").innerHTML=
`
AI提案ルート<br>
HND-OKA × ${trips}<br>
予算 ${total.toLocaleString()}円
`

}

function searchCheapest(){

let routes=[

{r:"HND-OKA",unit:9.5},
{r:"HND-FUK",unit:10.3},
{r:"HND-CTS",unit:11.1},
{r:"HND-TPE",unit:12.4},
{r:"HND-BKK",unit:13.5}

]

routes.sort((a,b)=>a.unit-b.unit)

let html=""

routes.forEach(r=>{

html+=`${r.r} : ${r.unit} 円/PP<br>`

})

document.getElementById("cheapResult").innerHTML=html

}

</script>

</body>
</html>
