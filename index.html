<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SFC Manager v46</title>
    <style>
        :root { --main-blue: #003f88; --accent-blue: #2a6df4; --bg-gray: #f3f6fa; --success: #28a745; --money: #d9534f; --ug-color: #6f42c1; --wait-color: #f0ad4e; }
        body{font-family:-apple-system, sans-serif; background:var(--bg-gray); margin:0; padding-bottom:100px; color:#333; -webkit-tap-highlight-color:transparent;}
        header{background:var(--main-blue); color:white; padding: 45px 15px 15px 15px; text-align:center; font-weight:bold; font-size:1.2em; position: sticky; top: 0; z-index: 100;}
        .container{padding:15px; max-width:720px; margin:auto;}
        .card{background:white; border-radius:14px; padding:18px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e0e6ed;}
        h3{margin: 0 0 15px 0; font-size: 1.1em; color: var(--main-blue); border-left: 5px solid var(--main-blue); padding-left: 10px;}
        input, select, button{width:100%; padding:14px; margin:8px 0; border-radius:10px; border:1px solid #ced4da; box-sizing: border-box; font-size:15px;}
        button{background:var(--main-blue); color:white; font-weight:bold; border:none; cursor: pointer;}
        .route-grid{display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; margin-bottom: 12px;}
        .routeBtn{padding:10px 5px; font-size:11px; background:#eef2f7; color:var(--main-blue); border:1px solid #d1d9e6; border-radius: 8px; margin:0;}
        .swap-btn{width:48px; height:48px; background:#fff; color:var(--main-blue); border:1px solid #ced4da; border-radius:50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        table{width:100%; border-collapse:collapse; font-size:11px; table-layout: fixed;}
        th, td{border-bottom:1px solid #eee; padding:12px 4px; text-align:center; word-wrap: break-word;}
        .progress{background:#e9ecef; height:26px; border-radius:13px; margin:15px 0; overflow:hidden; position: relative; border: 1px solid #dee2e6;}
        .progress-inner{background: linear-gradient(90deg, #003f88, #2a6df4); height:100%; width:0%; transition: width 1s ease-out; position: absolute; z-index: 2;}
        .progress-pending{background:rgba(42, 109, 244, 0.3); height:100%; width:0%; transition: width 1s ease-out; position: absolute; z-index: 1;}
        .graph-container { width: 100%; height: 120px; display: flex; align-items: flex-end; justify-content: space-around; padding: 20px 0 10px 0; background: #fafafa; border-radius: 8px; border-bottom: 2px solid #eee; position: relative;}
        .graph-bar { width: 18px; background: var(--accent-blue); border-radius: 4px 4px 0 0; position: relative; transition: height 0.5s;}
        .bar-val { position: absolute; top: -18px; width: 100%; text-align: center; font-size: 8px; color: #666; font-weight: bold;}
        .month-label { font-size: 9px; color: #999; margin-top: 5px; text-align: center; width: 18px;}
        .history-item{font-size:13px; padding:15px; border-bottom:1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; background: white;}
        .badge-ug { background: var(--ug-color); color: white; padding: 2px 5px; border-radius: 4px; font-size: 9px; display: inline-block; margin: 2px;}
        .badge-wait { background: var(--wait-color); color: white; padding: 2px 5px; border-radius: 4px; font-size: 9px; display: inline-block; margin: 2px;}
        .btn-mini { padding: 4px 8px; font-size: 10px; border-radius: 6px; width: auto; display: inline-block; margin: 2px; height: auto;}
        .wait-tag { background:var(--success); color:white; font-size:10px; padding:3px 7px; border-radius:5px; display:inline-block; margin-top:4px;}
    </style>
</head>
<body>

<header>SFC Manager v46</header>

<div class="container">
    <div class="card">
        <h3>進捗 & 5/19以降予測</h3>
        <div style="text-align:center; font-weight:bold; font-size:1.6em; color:var(--main-blue);" id="ppText">0 / 50,000 PP</div>
        <div style="text-align:center; font-size:12px; color:var(--accent-blue); margin-bottom:10px;" id="pendingText">(予約込合計: 0 PP)</div>
        <div class="progress"><div id="progressBar" class="progress-inner"></div><div id="progressPending" class="progress-pending"></div></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size:11px; text-align:center; border-top: 1px solid #eee; padding-top: 15px;">
            <div>予定総額<br><b id="totalBudget">¥0</b></div>
            <div>実績(済)<br><b id="paidBudget" style="color:var(--money)">¥0</b></div>
            <div>残りPP<br><b id="remainPP">50,000</b></div>
            <div>予約後不足<br><b id="remainAfterPending" style="color:var(--accent-blue)">50,000</b></div>
        </div>
    </div>

    <div class="card">
        <h3>フライト追加</h3>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <input id="from" placeholder="出発地" style="flex:1">
            <button class="swap-btn" onclick="swapRoute()">⇄</button>
            <input id="to" placeholder="到着地" style="flex:1">
        </div>
        <div class="route-grid">
            <button class="routeBtn" onclick="setRoute('羽田','那覇')">羽田-那覇</button>
            <button class="routeBtn" onclick="setRoute('那覇','石垣')">那覇-石垣</button>
            <button class="routeBtn" onclick="setRoute('羽田','石垣')">羽田-石垣</button>
            <button class="routeBtn" onclick="setRoute('羽田','宮古')">羽田-宮古</button>
            <button class="routeBtn" onclick="setRoute('羽田','千歳')">千歳</button>
            <button class="routeBtn" onclick="setRoute('羽田','福岡')">福岡</button>
            <button class="routeBtn" onclick="setRoute('羽田','シンガポール')">SIN</button>
            <button class="routeBtn" onclick="setRoute('羽田','バンコク')">BKK</button>
            <button class="routeBtn" onclick="setRoute('羽田','台北')">台北</button>
            <button class="routeBtn" onclick="setRoute('羽田','ホノルル')">HNL</button>
        </div>
        <select id="rate">
            <optgroup label="【5/19〜 新制度（国内）】">
                <option value="0.7_new" selected>国内:新シンプル(70%) +100pt</option>
                <option value="0.8_new">国内:新スタンダード(80%) +100pt</option>
                <option value="0.5_new_sale">国内:新セール(50%) +0pt</option>
                <option value="1.0_new">国内:新フレックス(100%) +400pt</option>
            </optgroup>
            <optgroup label="【〜5/18 現行（国内）】">
                <option value="0.75">国内:SV/バリュー(75%) +0pt</option>
                <option value="0.75_plus">国内:特割/バリュー(75%) +400pt</option>
                <option value="1.25">国内:プレミアム(125%) +400pt</option>
                <option value="0.5_old">国内:SVセール(旧50%) +0pt</option>
            </optgroup>
            <optgroup label="【国際線】">
                <option value="1.0_intl">海外:100% +400pt</option>
                <option value="0.7_intl">海外:70% +400pt</option>
                <option value="0.5_intl">海外:50% +400pt</option>
            </optgroup>
        </select>
        <div style="display:flex; gap:10px;">
            <select id="ugStatus" style="flex:1">
                <option value="none">UGなし</option>
                <option value="pending">UG空席待ち</option>
                <option value="applied">UG済</option>
            </select>
            <input id="price" type="number" placeholder="代金(往復なら総額)" style="flex:1">
        </div>
        <input type="date" id="flightDate">
        <select id="trip" onchange="toggleTrip()"><option value="oneway">片道</option><option value="round" selected>往復</option></select>
        <div id="timeArea">
            <div style="display:flex; gap:10px;">
                <div style="flex:1">往路発<input type="time" id="departTime"></div>
                <div style="flex:1">往路着<input type="time" id="arriveTime"></div>
            </div>
            <div id="returnArea" style="display:flex; gap:10px; margin-top:8px;">
                <div style="flex:1">復路発<input type="time" id="returnDepart"></div>
                <div style="flex:1">復路着<input type="time" id="returnArrive"></div>
            </div>
        </div>
        <button onclick="addFlight()" style="background:var(--accent-blue); margin-top:15px; font-size:1.1em; height:55px;">プランを保存</button>
    </div>

    <div class="card">
        <h3>フライト一覧</h3>
        <div style="overflow-x:auto;"><table>
            <thead><tr><th style="width:18%">日付</th><th style="width:40%">区間/状態</th><th style="width:15%">PP</th><th style="width:12%">済</th><th style="width:15%">操作</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table></div>
    </div>

    <div class="card">
        <h3>月別獲得PP推移</h3>
        <div id="ppGraph" class="graph-container"></div>
        <div id="graphLabels" style="display:flex; justify-content:space-around;"></div>
    </div>

    <div class="card">
        <h3>履歴（タップで再登録）</h3>
        <div id="historyList"></div>
    </div>

    <div class="card">
        <h3>データ管理</h3>
        <div style="display:flex; gap:10px;">
            <button style="flex:1; background:#6c757d;" onclick="showBackup()">出力</button>
            <button style="flex:1; background:#6c757d;" onclick="importData()">復元</button>
        </div>
        <textarea id="backupText" style="display:none; width:100%; height:120px; margin-top:10px; font-size:10px; font-family:monospace;"></textarea>
    </div>
</div>

<script>
const airportMap = {"羽田":"HND","成田":"NRT","那覇":"OKA","石垣":"ISG","宮古":"MMY","千歳":"CTS","福岡":"FUK","伊丹":"ITM","名古屋":"NGO","富山":"TOY","小松":"KMQ","シンガポール":"SIN","バンコク":"BKK","台北":"TSA","ホノルル":"HNL","クアラルンプール":"KUL","シドニー":"SYD","ジャカルタ":"CGK","デリー":"DEL","ニューヨーク":"JFK","ロンドン":"LHR"};
const distDB = {"HND-OKA":984,"HND-ISG":1221,"HND-MMY":1158,"HND-CTS":510,"HND-FUK":567,"HND-ITM":280,"HND-NGO":193,"HND-TOY":176,"HND-KMQ":211,"OKA-ISG":73,"OKA-MMY":177,"NRT-OKA":1046,"NRT-ISG":1283,"ITM-OKA":739,"NGO-OKA":809,"HND-SIN":3312,"NRT-SIN":3338,"HND-BKK":2889,"NRT-BKK":2869,"HND-TSA":1330,"HND-HNL":3831,"NRT-HNL":3819,"HND-KUL":3338,"HND-SYD":4930,"HND-CGK":3612,"HND-DEL":3656,"HND-JFK":6723,"HND-LHR":6214};

let flights = JSON.parse(localStorage.getItem("sfc_v17_data")) || [];

function getCode(n) { return airportMap[n] || (n?n.toUpperCase():""); }
function getName(c) { for(let n in airportMap){if(airportMap[n]===c) return n;} return c; }
function setRoute(f,t) { document.getElementById("from").value=f; document.getElementById("to").value=t; }
function swapRoute() { const f=document.getElementById("from").value, t=document.getElementById("to").value; document.getElementById("from").value=t; document.getElementById("to").value=f; }
function toggleTrip() { document.getElementById("returnArea").style.display = (document.getElementById("trip").value==='round'?'flex':'none'); }

function calcPP(f, t, rStr, ug) {
    let key = f+"-"+t, rev = t+"-"+f;
    let base = distDB[key] || distDB[rev] || 0;
    if(base===0) return 0;
    const isAsia = ["SIN","BKK","TSA","KUL","SYD","CGK","DEL"].includes(f)||["SIN","BKK","TSA","KUL","SYD","CGK","DEL"].includes(t);
    const isOtherIntl = ["HNL","JFK","LHR"].includes(f)||["HNL","JFK","LHR"].includes(t);
    let multi = isAsia ? 1.5 : (isOtherIntl ? 1.0 : 2.0);
    if(ug === 'applied') return Math.floor(base * 1.25 * multi) + 400;
    if(rStr === "0.7_new") return Math.floor(base * 0.7 * multi) + 100;
    if(rStr === "0.8_new") return Math.floor(base * 0.8 * multi) + 100;
    if(rStr === "0.5_new_sale") return Math.floor(base * 0.5 * multi);
    if(rStr === "1.0_new") return Math.floor(base * 1.0 * multi) + 400;
    let rate = parseFloat(rStr);
    let bonus = (rStr.includes("plus") || rStr === "1.25" || rStr.includes("intl") || isAsia || isOtherIntl) ? 400 : 0;
    return Math.floor(base * rate * multi) + bonus;
}

function addToCalendar(f) {
    const start = f.date.replace(/-/g, '') + 'T' + (f.depart ? f.depart.replace(':', '') : '0000') + '00';
    const end = f.date.replace(/-/g, '') + 'T' + (f.arrive ? f.arrive.replace(':', '') : '2359') + '00';
    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('UG申込開始:'+getName(f.from)+'→'+getName(f.to))}&dates=${start}/${end}&details=${encodeURIComponent('SFC修行用UG通知')}`;
    window.open(url, '_blank');
}

function updateUG(id, status) {
    let f = flights.find(x => x.id === id);
    if(f) { f.ug = status; save(); }
}

function reuse(id) {
    const f = flights.find(x => x.id === id);
    if(!f) return;
    document.getElementById("from").value = getName(f.from);
    document.getElementById("to").value = getName(f.to);
    document.getElementById("rate").value = f.rateStr;
    document.getElementById("ugStatus").value = f.ug || 'none';
    document.getElementById("price").value = f.price * (f.trip==='round' ? 2 : 1);
    window.scrollTo({top: 250, behavior: 'smooth'});
}

function addFlight() {
    const from=getCode(document.getElementById("from").value), to=getCode(document.getElementById("to").value);
    const date=document.getElementById("flightDate").value, trip=document.getElementById("trip").value;
    const rStr=document.getElementById("rate").value, ug=document.getElementById("ugStatus").value, price=parseInt(document.getElementById("price").value)||0;
    if(!from||!to||!date) return alert("入力不足");
    const f1 = { id:Date.now(), from, to, date, depart:document.getElementById("departTime").value, arrive:document.getElementById("arriveTime").value, price:(trip==="round"?price/2:price), rateStr:rStr, ug, done:false, trip:trip };
    flights.push(f1);
    if(trip==="round") flights.push({...f1, id:Date.now()+1, from:to, to:from, depart:document.getElementById("returnDepart").value, arrive:document.getElementById("returnArrive").value });
    save();
}

function save(){ localStorage.setItem("sfc_v17_data", JSON.stringify(flights)); render(); }
function del(id){ if(confirm("削除?")){ flights=flights.filter(f=>f.id!==id); save(); } }
function toggleDone(id){ let f=flights.find(x=>x.id===id); if(f) f.done=!f.done; save(); }

function render() {
    const table=document.getElementById("tableBody"), graph=document.getElementById("ppGraph"), gLabels=document.getElementById("graphLabels"), history=document.getElementById("historyList");
    table.innerHTML=""; graph.innerHTML=""; gLabels.innerHTML=""; history.innerHTML="";
    let actualP=0, totalP=0, totalC=0, monthlyPP=Array(12).fill(0);
    flights.sort((a,b)=> (a.date+(a.depart||"")).localeCompare(b.date+(b.depart||"")));
    
    flights.forEach((f, idx) => {
        let pp = calcPP(f.from, f.to, f.rateStr, f.ug);
        totalP += pp; totalC += (f.price||0);
        if(f.done) { actualP += pp; let m=parseInt(f.date.slice(5,7)); monthlyPP[m-1]+=pp; }
        
        let ugBadges = "";
        if(f.ug === 'applied') ugBadges = '<span class="badge-ug">UG済</span>';
        else if(f.ug === 'pending') ugBadges = '<span class="badge-wait">空席待</span><button class="btn-mini" style="background:var(--ug-color)" onclick="updateUG('+f.id+',\'applied\')">+UG確定</button>';
        else ugBadges = '<button class="btn-mini" style="background:#6c757d" onclick="updateUG('+f.id+',\'pending\')">+UG申込</button>';
        
        let waitHtml = "";
        if(idx < flights.length - 1) {
            let next = flights[idx+1];
            if(f.to === next.from && f.date === next.date && f.arrive && next.depart) {
                let diff = (new Date("2000/01/01 "+next.depart) - new Date("2000/01/01 "+f.arrive)) / 60000;
                if(diff > 0) waitHtml = `<br><span class="wait-tag">${Math.floor(diff/60)}h${diff%60}m 待機</span>`;
            }
        }

        table.innerHTML += `<tr><td>${f.date.slice(5)}</td><td>${getName(f.from)}→${getName(f.to)}<br>${ugBadges}${waitHtml}</td><td>${pp.toLocaleString()}</td><td><input type="checkbox" ${f.done?'checked':''} onchange="toggleDone(${f.id})"></td><td><button onclick="addToCalendar(${JSON.stringify(f).replace(/"/g, '&quot;')})" style="background:none; color:var(--accent-blue); font-size:16px; width:auto; padding:0;">📅</button><br><button onclick="del(${f.id})" style="background:none; color:red; font-size:16px; width:auto; padding:0;">×</button></td></tr>`;
        history.innerHTML += `<div class="history-item" onclick="reuse(${f.id})"><span>${f.date.slice(5)} ${getName(f.from)}→${getName(f.to)}</span><b>${pp.toLocaleString()} PP</b></div>`;
    });

    document.getElementById("ppText").innerText = actualP.toLocaleString() + " / 50,000 PP";
    document.getElementById("pendingText").innerText = "(予約込合計: " + totalP.toLocaleString() + " PP)";
    document.getElementById("progressBar").style.width = Math.min(100, (actualP/50000*100)) + "%";
    document.getElementById("progressPending").style.width = Math.min(100, (totalP/50000*100)) + "%";
    document.getElementById("remainPP").innerText = (50000-actualP).toLocaleString();
    document.getElementById("remainAfterPending").innerText = Math.max(0, 50000 - totalP).toLocaleString();
    document.getElementById("totalBudget").innerText = "¥"+totalC.toLocaleString();
    document.getElementById("paidBudget").innerText = "¥"+(flights.filter(x=>x.done).reduce((s,x)=>s+(x.price||0),0)).toLocaleString();
    
    const maxM = Math.max(...monthlyPP, 1);
    monthlyPP.forEach((pp, i) => { 
        const h=(pp/maxM)*100; 
        graph.innerHTML+=`<div class="graph-bar" style="height:${h}%">${pp>0?`<span class="bar-val">${pp}</span>`:''}</div>`;
        gLabels.innerHTML+=`<div class="month-label">${i+1}</div>`;
    });
}
function showBackup(){ const t=document.getElementById("backupText"); t.style.display="block"; t.value=JSON.stringify(flights); t.select(); }
function importData(){ let s=prompt("復元データを貼付:"); if(!s)return; try{flights=JSON.parse(s);save();location.reload();}catch(e){alert("失敗");} }
render(); toggleTrip();
</script>
</body>
</html>
